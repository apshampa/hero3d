<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revanth — Hero Animation</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Tiro+Devanagari+Hindi:wght@400&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fafafa;
      font-family: 'Inter', sans-serif;
    }

    /* ── Cyclorama Background ───────────────── */
    #bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 120% 100% at 50% 40%, #fafafa 0%, #ededed 80%, #e0e0e0 100%);
    }

    /* ── Video Walk Layer ───────────────────── */
    #walk-video {
      position: fixed;
      z-index: 5;
      pointer-events: none;
      height: 70vh;
      bottom: 5%;
      left: 0;
      transform: translateX(-100%);
      object-fit: contain;
    }

    /* ── Giant Text Zone ────────────────────── */
    #zone-designer {
      position: fixed;
      z-index: 2;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;

      font-size: clamp(4rem, 12vw, 15rem);
      font-weight: 900;
      color: #111111;
      letter-spacing: -0.02em;
    }

    #zone-designer .letter {
      display: inline-block;
      opacity: 0;
      transition: opacity 0.4s ease-out;
      will-change: opacity, font-family;
      line-height: 1;
    }

    #zone-designer .letter.english.cycle-font {
      width: 0.65em;
      text-align: center;
    }

    #zone-designer .letter.indic-cycle {
      text-align: center;
      overflow: visible;
    }

    #zone-designer .letter.revealed {
      opacity: 1;
    }

    #zone-designer .hindi {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: 1.1em;
      font-weight: 400;
    }

    #zone-designer .english {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    /* ── Cyclorama Floor Sweep ──────────────── */
    #floor-glow {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 45%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 160% 50% at 50% 0%, transparent 60%, rgba(0, 0, 0, 0.025) 100%),
        linear-gradient(to top, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0.015) 40%, transparent 100%);
    }

    /* ── Loading / Intro White Screen ──────── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    #loader .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 0, 0, 0.05);
      border-top-color: #111111;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
    }

    #loader p {
      color: #333333;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Loading / Intro White Screen -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Loading</p>
  </div>

  <!-- Background -->
  <div id="bg-gradient"></div>
  <div id="floor-glow"></div>

  <!-- Text Wipe Layer -->
  <div id="zone-designer"></div>

  <!-- Walk Cycle Video -->
  <video id="walk-video" muted loop playsinline preload="auto">
    <source src="./walk-cycle.webm" type="video/webm" />
    <source src="./Cartwheel-export.mp4" type="video/mp4" />
  </video>

  <script>
    // ════════════════════════════════════════════
    // CONFIGURATION
    // ════════════════════════════════════════════
    const TRAVEL_DURATION = 6;
    const INTRO_DELAY = 1.0;
    const PAUSE_BETWEEN = 1.5;

    // ── ROTATING WORDS ──
    // Each word has a 'before' part, hyphen, and 'after' part.
    // One part is 'indic' (cycles through scripts), the other is 'english' (font cycles).
    const WORDS = [
      {
        // डि-signer → "Designer"
        before: { text: 'डि', type: 'indic' },
        after:  { text: 'signer', type: 'english' },
        indicCycle: ['డి', 'ഡി', 'ડી', 'ਡੀ', 'ଡି', 'ডি']
      },
      {
        // Story-टेलर → "Storyteller"
        before: { text: 'Story', type: 'english' },
        after:  { text: 'टेलर', type: 'indic' },
        indicCycle: ['టెల్లర్', 'ടെല്ലർ', 'ટેલર', 'ਟੈਲਰ', 'ଟେଲର', 'টেলার']
      }
    ];
    let currentWordIndex = 0;

    // ── FONT CYCLING FAMILIES ──
    const FONT_CYCLE_FAMILIES = [
      "'Inter', sans-serif",
      "'Space Mono', monospace",
      "'Times New Roman', serif",
      "'Courier New', Annai MN",
      "Arial, sans-serif", "Katari"
    ];

    // ════════════════════════════════════════════
    // TEXT ZONE — DYNAMIC BUILD
    // ════════════════════════════════════════════
    const zDesigner = document.getElementById('zone-designer');
    let revealTargets = [];
    let indicSpan = null; // The span that cycles through Indic scripts

    function buildPart(text, type) {
      if (type === 'indic') {
        // Single span for the Indic part
        const span = document.createElement('span');
        span.classList.add('letter', 'hindi', 'indic-cycle', 'cycle-font');
        span.textContent = text;
        zDesigner.appendChild(span);
        indicSpan = span;
      } else {
        // Individual letter spans for English
        text.split('').forEach((char) => {
          const span = document.createElement('span');
          span.classList.add('letter', 'english', 'cycle-font');
          span.textContent = char;
          zDesigner.appendChild(span);
        });
      }
    }

    function buildWord(index) {
      const word = WORDS[index];
      zDesigner.innerHTML = '';
      indicSpan = null;

      // Before part
      buildPart(word.before.text, word.before.type);

      // Hyphen
      const hyphen = document.createElement('span');
      hyphen.classList.add('letter', 'english');
      hyphen.textContent = '-';
      zDesigner.appendChild(hyphen);

      // After part
      buildPart(word.after.text, word.after.type);

      revealTargets = Array.from(zDesigner.querySelectorAll('.letter'));
    }

    // Build the first word
    buildWord(0);

    // ════════════════════════════════════════════
    // FONT & INDIC CYCLING
    // ════════════════════════════════════════════
    // indicCycleActive: true during pause + wipe phases (after first reveal)
    let indicCycleActive = false;

    // Font cycling — 200ms (all cycle-font letters, skip indic when it's script-cycling)
    setInterval(() => {
      const cyclingLetters = zDesigner.querySelectorAll('.letter.cycle-font.revealed');
      cyclingLetters.forEach(el => {
        // Skip font cycling on the indic span when it's doing script cycling
        if (el.classList.contains('indic-cycle') && indicCycleActive) return;
        const randomFont = FONT_CYCLE_FAMILIES[Math.floor(Math.random() * FONT_CYCLE_FAMILIES.length)];
        el.style.fontFamily = randomFont;
      });
    }, 200);

    // Indic script cycling — 500ms (only when active)
    setInterval(() => {
      if (!indicCycleActive || !indicSpan) return;
      if (!indicSpan.classList.contains('revealed')) return;
      const currentIndicCycle = WORDS[currentWordIndex].indicCycle;
      const randomChar = currentIndicCycle[Math.floor(Math.random() * currentIndicCycle.length)];
      indicSpan.textContent = randomChar;
    }, 500);

    // ════════════════════════════════════════════
    // VIDEO WALK SETUP
    // ════════════════════════════════════════════
    const video = document.getElementById('walk-video');
    const vw = () => window.innerWidth;

    let animationStarted = false;
    let phaseStartTime = null;
    let phase = 'reveal';

    function startAnimation() {
      if (animationStarted) return;
      animationStarted = true;

      const loaderSpinner = document.querySelector('#loader .spinner');
      const loaderText = document.querySelector('#loader p');
      if (loaderSpinner) loaderSpinner.style.display = 'none';
      if (loaderText) loaderText.style.display = 'none';

      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
        video.play().catch(() => {
          document.addEventListener('touchstart', () => {
            video.play();
          }, { once: true });
        });
        phase = 'reveal';
        phaseStartTime = performance.now();
        requestAnimationFrame(animate);
      }, INTRO_DELAY * 1000);
    }

    video.addEventListener('canplaythrough', startAnimation, { once: true });
    video.addEventListener('loadeddata', startAnimation);

    // ════════════════════════════════════════════
    // ANIMATION LOOP
    // reveal → pause (indic cycling) → wipe (indic continues) → pause → next word → repeat
    // ════════════════════════════════════════════
    function animate(timestamp) {
      requestAnimationFrame(animate);
      if (!phaseStartTime) return;

      const elapsed = (timestamp - phaseStartTime) / 1000;
      const videoWidth = video.getBoundingClientRect().width;
      const screenW = vw();

      if (phase === 'reveal') {
        // Walk left → right, reveal letters. Indic stays in base script.
        indicCycleActive = false;
        const progress = Math.min(elapsed / TRAVEL_DURATION, 1.0);
        const startPx = -videoWidth;
        const endPx = screenW + videoWidth * 0.2;
        const currentPx = startPx + (endPx - startPx) * progress;
        video.style.transform = `translateX(${currentPx}px) scaleX(1)`;

        const videoRect = video.getBoundingClientRect();
        const charScreenX = videoRect.left + videoRect.width / 2;
        revealTargets.forEach((el) => {
          if (el.classList.contains('revealed')) return;
          const rect = el.getBoundingClientRect();
          const letterCenter = rect.left + rect.width / 2;
          if (charScreenX > letterCenter) {
            el.classList.add('revealed');
          }
        });

        if (progress >= 1.0) {
          revealTargets.forEach(el => el.classList.add('revealed'));
          indicCycleActive = true; // Start Indic cycling
          phase = 'pause-before-wipe';
          phaseStartTime = timestamp;
        }

      } else if (phase === 'pause-before-wipe') {
        // Pause: text fully visible, Indic cycling active
        if (elapsed >= PAUSE_BETWEEN) {
          // Keep indicCycleActive = true — cycling continues during wipe
          phase = 'wipe';
          phaseStartTime = timestamp;
        }

      } else if (phase === 'wipe') {
        // Walk right → left, wipe letters off. Indic cycling continues.
        const progress = Math.min(elapsed / TRAVEL_DURATION, 1.0);
        const startPx = screenW + videoWidth * 0.2;
        const endPx = -videoWidth;
        const currentPx = startPx + (endPx - startPx) * progress;
        video.style.transform = `translateX(${currentPx}px) scaleX(-1)`;

        const videoRect = video.getBoundingClientRect();
        const charScreenX = videoRect.left + videoRect.width / 2;
        revealTargets.forEach((el) => {
          if (!el.classList.contains('revealed')) return;
          const rect = el.getBoundingClientRect();
          const letterCenter = rect.left + rect.width / 2;
          if (charScreenX < letterCenter) {
            el.classList.remove('revealed');
          }
        });

        if (progress >= 1.0) {
          revealTargets.forEach(el => el.classList.remove('revealed'));
          indicCycleActive = false; // Stop cycling
          phase = 'pause-before-reveal';
          phaseStartTime = timestamp;
        }

      } else if (phase === 'pause-before-reveal') {
        // Pause: text fully hidden, then switch to next word
        if (elapsed >= PAUSE_BETWEEN) {
          currentWordIndex = (currentWordIndex + 1) % WORDS.length;
          buildWord(currentWordIndex);
          phase = 'reveal';
          phaseStartTime = timestamp;
        }
      }
    }
  </script>
</body>

</html>
